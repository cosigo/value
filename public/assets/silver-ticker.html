<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      height: 56px;
    }

    .tradingview-widget-container {
      width: 100%;
      height: 56px;
      overflow: hidden;
      border-top: 1px solid rgba(212, 175, 55, .35);
      border-bottom: 1px solid rgba(192, 192, 192, .18);
      background: rgba(0, 0, 0, .18);
    }

    #tv-ticker {
      width: 100%;
      height: 56px;
    }
  </style>
</head>
<body>
  <div class="tradingview-widget-container">
    <div id="tv-ticker"></div>
  </div>

  <script>
    const config = {
      symbols: [
        { proName: "OANDA:XAGUSD", title: "SILVER" },
        { proName: "OANDA:XAUUSD", title: "GOLD" },
        { proName: "BITSTAMP:BTCUSD", title: "BITCOIN" },
        { proName: "BITSTAMP:LTCUSD", title: "LITECOIN" },
        { proName: "BITSTAMP:BNBUSD", title: "BINANCE" },
        { proName: "OANDA:USDMXN", title: "USD/MXN" },
        { proName: "OANDA:USDJPY", title: "USD/JPY" },
        { proName: "OANDA:EURUSD", title: "EUR/USD" },
        { proName: "FX_IDC:USDCLP", title: "USD/CLP" },
        { proName: "FX_IDC:USDCNY", title: "USD/CNY" }
      ],
      colorTheme: "dark",
      displayMode: "regular",
      showSymbolLogo: false,
      isTransparent: true,
      locale: "en"
    };

    const script = document.createElement("script");
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js";
    script.async = true;
    script.innerHTML = JSON.stringify(config);
    document.getElementById("tv-ticker").appendChild(script);
  </script>
</body>
</html>
